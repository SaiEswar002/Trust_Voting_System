{% extends 'base.html' %}

{% block content %}
<div class="card text-center" style="margin-top: 3rem; max-width: 500px; margin-left: auto; margin-right: auto;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" style="margin-bottom: 1rem;">
        <path d="M10.29 3.86a2 2 0 0 1 3.42 0l7.22 12.42A2 2 0 0 1 19.22 19.33H4.78a2 2 0 0 1-1.71-2.91l7.22-12.42z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <h2 style="color: var(--error); margin-bottom: 0.5rem;">Access Denied (403)</h2>
    <p style="margin-bottom: 2rem;">Your currently active role does not have permission to access this section of the election network.</p>
    <a href="{{ url_for('login_page') }}" class="btn outline-btn">Return to Security Portal</a>
</div>
{% endblock %}
