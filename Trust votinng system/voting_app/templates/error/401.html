{% extends 'base.html' %}

{% block content %}
<div class="card text-center" style="margin-top: 3rem; max-width: 500px; margin-left: auto; margin-right: auto;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" style="margin-bottom: 1rem;">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <h2 style="color: var(--error); margin-bottom: 0.5rem;">Access Unauthorized (401)</h2>
    <p style="margin-bottom: 2rem;">Authentication is required to access this portal section. Please login with valid credentials.</p>
    <a href="{{ url_for('login_page') }}" class="btn outline-btn">Go to Security Portal</a>
</div>
{% endblock %}
