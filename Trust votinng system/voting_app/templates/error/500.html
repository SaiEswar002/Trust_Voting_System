{% extends 'base.html' %}

{% block content %}
<div class="card text-center" style="margin-top: 3rem; max-width: 500px; margin-left: auto; margin-right: auto;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" style="margin-bottom: 1rem;">
        <path d="M12 9v4"></path>
        <path d="M12 17h.01"></path>
        <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"></path>
    </svg>
    <h2 style="color: var(--error); margin-bottom: 0.5rem;">Network Failure (500)</h2>
    <p style="margin-bottom: 2rem;">The server encountered an unexpected condition and was unable to complete your request. Please notify a technical administrator.</p>
    <a href="{{ url_for('login_page') }}" class="btn outline-btn">Return to Portal</a>
</div>
{% endblock %}
