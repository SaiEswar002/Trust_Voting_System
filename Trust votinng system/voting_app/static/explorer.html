<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Explorer & Hacker Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/network.js"></script>
    <style>
        .block-card { border: 1px solid var(--primary-teal); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background: #f8fafc; }
        .block-header { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 0.5rem; color: var(--primary-teal); }
        .block-data { background: #0f172a; color: #10b981; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; font-size: 0.8rem; overflow-x: auto;}
        .hash-string { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); word-break: break-all; }
    </style>
</head>
<body>
    <header class="gov-header" style="background-color: #0f172a;">
        <div class="header-content">
            <div class="logo-text">
                <h1>Public Ledger Explorer</h1>
                <span>Validator Node Interface</span>
            </div>
            <nav class="top-nav">
                <a href="/">Election Booth</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 800px; margin-top: 3rem;">
        <section class="card">
            <h3>Chain Integrity Check</h3>
            <p>Verify that no historical block has been tampered with.</p>
            <button id="validate-btn" class="btn primary-btn btn-full">Validate Entire Chain</button>
            <div id="validation-result" class="message hidden" style="margin-top: 1rem;"></div>
        </section>

        <section class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Mined Blocks</h3>
                <button id="refresh-btn" class="btn outline-btn" style="padding: 0.5rem 1rem;">Refresh</button>
            </div>
            
            <div id="blocks-container">
                <!-- Blocks populated here -->
            </div>
        </section>

        <!-- Hack Modal -->
        <div id="hack-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 style="color: #ef4444;">Hacker Simulation: Mutate Block</h3>
                    <button class="close-btn" onclick="document.getElementById('hack-modal').classList.add('hidden')">&times;</button>
                </div>
                <div style="padding: 1.5rem;">
                    <p style="margin-bottom: 1rem;">Edit the JSON payload directly. This simulates a bad actor accessing the node's memory bypassing consensus.</p>
                    <input type="hidden" id="hack-index">
                    <textarea id="hack-data" style="width: 100%; height: 200px; font-family: monospace; padding: 0.5rem;"></textarea>
                    <button id="execute-hack-btn" class="btn btn-full" style="background-color: #ef4444; color: white; margin-top: 1rem;">Inject Malicious Payload</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('blocks-container');
            const valBtn = document.getElementById('validate-btn');
            const valRes = document.getElementById('validation-result');
            
            async function loadChain() {
                container.innerHTML = '<div class="spinner"></div>';
                const res = await fetch('/api/blockchain');
                const data = await res.json();
                
                container.innerHTML = '';
                data.chain.forEach(block => {
                    const div = document.createElement('div');
                    div.className = 'block-card';
                    
                    const editBtnHtml = block.index > 0 ? `<button class="btn outline-btn" style="padding:0.25rem 0.5rem; font-size:0.75rem" onclick="openHackModal(${block.index}, '${encodeURIComponent(JSON.stringify(block.data))}')">Mutate Data (Hack)</button>` : '';

                    div.innerHTML = `
                        <div class="block-header">
                            <span>Block #${block.index}</span>
                            ${editBtnHtml}
                        </div>
                        <p class="hash-string"><strong>Prev Hash:</strong> ${block.previous_hash}</p>
                        <p class="hash-string"><strong>Hash:</strong> ${block.hash}</p>
                        <div class="block-data">${JSON.stringify(block.data, null, 2)}</div>
                    `;
                    container.appendChild(div);
                });
            }

            valBtn.addEventListener('click', async () => {
                const res = await fetch('/api/validate_chain');
                const data = await res.json();
                
                // Clear previous highlights
                document.querySelectorAll('.block-card').forEach(c => c.style.border = '1px solid var(--primary-teal)');
                
                valRes.classList.remove('hidden');
                if (data.is_valid) {
                    valRes.className = 'message success';
                    valRes.innerText = "✅ Validation Passed: The cryptographic chain is completely intact. All block hashes verified.";
                } else {
                    valRes.className = 'message error';
                    valRes.innerHTML = `❌ <strong>Validation FAILED at Block #${data.broken_block}</strong><br>${data.reason}`;
                    
                    // Visual highlight of the specific block card
                    const cards = document.querySelectorAll('.block-card');
                    if (cards[data.broken_block]) {
                        cards[data.broken_block].style.border = '3px solid #ef4444';
                        cards[data.broken_block].style.boxShadow = '0 0 15px rgba(239, 68, 68, 0.4)';
                        cards[data.broken_block].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });

            document.getElementById('refresh-btn').addEventListener('click', loadChain);

            document.getElementById('execute-hack-btn').addEventListener('click', async () => {
                const idx = document.getElementById('hack-index').value;
                let payload;
                try {
                    payload = JSON.parse(document.getElementById('hack-data').value);
                } catch(e) { /* might just want to inject bad JSON or string */ 
                    payload = document.getElementById('hack-data').value;
                }

                await fetch('/api/hack_block', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ block_index: parseInt(idx), new_data: payload })
                });

                document.getElementById('hack-modal').classList.add('hidden');
                loadChain();
            });

            window.openHackModal = function(index, dataUri) {
                document.getElementById('hack-index').value = index;
                document.getElementById('hack-data').value = JSON.stringify(JSON.parse(decodeURIComponent(dataUri)), null, 2);
                document.getElementById('hack-modal').classList.remove('hidden');
            };

            loadChain();
        });
    </script>
</body>
</html>
