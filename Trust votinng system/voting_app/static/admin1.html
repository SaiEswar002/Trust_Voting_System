<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booth Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #f8fafc; color: var(--text-dark); font-weight: 600; }
        .badge.success { background: #ecfdf5; color: #047857; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .badge.pending { background: #f1f5f9; color: #64748b; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header class="gov-header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-text">
                    <h1>Department of Elections</h1>
                    <span>Booth Administrator Terminal</span>
                </div>
            </div>
            <nav class="top-nav">
                <a href="/">Election Booth</a>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 3rem;">
        <section class="card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                <div>
                    <h3>Registered Voters Live Status</h3>
                    <p>Monitors biometric verification and voting activity in real-time.</p>
                </div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Voter ID</th>
                        <th>Fingerprint Hash</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="voter-tbody">
                    <!-- Populated dynamically -->
                </tbody>
            </table>
            
        </section>
    </main>

    <a href="#" id="hard-reset-btn" style="position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #94a3b8; text-decoration: none; opacity: 0.5; z-index: 1000;">[Master Reset]</a>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tbody = document.getElementById('voter-tbody');
            
            async function loadVoters() {
                try {
                    const res = await fetch('/api/voters');
                    const data = await res.json();
                    
                    tbody.innerHTML = '';
                    data.forEach(voter => {
                        const tr = document.createElement('tr');
                        const statusClass = voter.has_voted ? 'badge success' : 'badge pending';
                        const statusText = voter.has_voted ? 'Verified & Voted' : 'Awaiting Vote';
                        
                        tr.innerHTML = `
                            <td style="font-weight: 500;">${voter.voter_id}</td>
                            <td style="font-family: monospace; font-size: 0.8rem;">${voter.fingerprint_hash}</td>
                            <td><span class="${statusClass}">${statusText}</span></td>
                        `;
                        tbody.appendChild(tr);
                    });
                } catch (e) {
                    console.error("Error fetching voters:", e);
                }
            }

            loadVoters();
            setInterval(loadVoters, 3000); // Live poll

            document.getElementById('hard-reset-btn').addEventListener('click', async () => {
                if(confirm("🚨 WARNING: Are you sure you want to completely erase the blockchain and reset all voter statuses?")) {
                    await fetch('/api/reset', { method: 'POST' });
                    loadVoters();
                    alert("System Memory completely wiped and reset!");
                }
            });
        });
    </script>
</body>
</html>
